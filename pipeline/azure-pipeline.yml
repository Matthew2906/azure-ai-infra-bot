trigger: none

parameters:
  - name: infraPrompt
    displayName: 'Describe the Azure infrastructure you want to create'
    type: string
    default: ''

pool:
  vmImage: 'ubuntu-latest'

variables:
  terraformVersion: '1.7.5'

stages:
  - stage: Generate
    displayName: 'Generate Terraform with AI'
    jobs:
      - job: GenerateInfra
        displayName: 'Run Azure OpenAI Script'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'
            displayName: 'Set up Python'
          - script: |
              pip install openai
            displayName: 'Install Python dependencies'
          - script: |
              python scripts/generate_infra.py
            displayName: 'Generate Terraform config'
            env:
              AZURE_OPENAI_ENDPOINT: $(AZURE_OPENAI_ENDPOINT)
              AZURE_OPENAI_KEY: $(AZURE_OPENAI_KEY)
              INFRA_PROMPT: ${{ parameters.infraPrompt }}
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

  - stage: Deploy
    displayName: 'Deploy Infrastructure'
    dependsOn: Generate
    jobs:
      - job: TerraformApply
        displayName: 'Terraform Plan and Apply'
        steps:
          - script: |
              wget -O terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
              unzip terraform.zip
              sudo mv terraform /usr/local/bin/
            displayName: 'Install Terraform'
          - script: |
              cd terraform
              terraform init
              terraform plan
              terraform apply -auto-approve
            displayName: 'Terraform Init, Plan and Apply'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)